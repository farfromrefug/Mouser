name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  MOUSER_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
  MOUSER_GIT_COMMIT: ${{ github.sha }}
  MOUSER_GIT_DIRTY: "false"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller Mouser.spec --noconfirm

      - name: Create archive
        run: Compress-Archive -Path dist\Mouser -DestinationPath Mouser-Windows.zip

      - uses: actions/upload-artifact@v7
        with:
          name: Mouser-Windows
          path: Mouser-Windows.zip

  build-macos:
    name: build-macos (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Apple Silicon
            runner: macos-15
            python_architecture: arm64
            pyinstaller_target_arch: arm64
            artifact_name: Mouser-macOS
            archive_name: Mouser-macOS.zip
          - name: Intel
            runner: macos-15-intel
            python_architecture: x64
            pyinstaller_target_arch: x86_64
            artifact_name: Mouser-macOS-intel
            archive_name: Mouser-macOS-intel.zip
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          architecture: ${{ matrix.python_architecture }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build macOS app
        env:
          PYINSTALLER_TARGET_ARCH: ${{ matrix.pyinstaller_target_arch }}
        run: |
          chmod +x build_macos_app.sh
          ./build_macos_app.sh

      - name: Create archive
        run: cd dist && zip -r -y "../${{ matrix.archive_name }}" Mouser.app

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_name }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libhidapi-dev dpkg-dev imagemagick

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller Mouser-linux.spec --noconfirm

      - name: Create zip archive
        run: cd dist && zip -r -y ../Mouser-Linux.zip Mouser

      - name: Build .deb package
        run: |
          chmod +x build_deb.sh
          ./build_deb.sh

      - uses: actions/upload-artifact@v7
        with:
          name: Mouser-Linux
          path: Mouser-Linux.zip

      - uses: actions/upload-artifact@v7
        with:
          name: Mouser-Linux-deb
          path: dist/Mouser-Linux.deb

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8

      - name: Generate latest.json
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${{ github.ref_name }}"
          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "downloads": {
              "windows-x64":  "${BASE_URL}/Mouser-Windows.zip",
              "macos-arm64":  "${BASE_URL}/Mouser-macOS.zip",
              "macos-x86_64": "${BASE_URL}/Mouser-macOS-intel.zip",
              "linux-deb":    "${BASE_URL}/Mouser-Linux.deb",
              "linux-zip":    "${BASE_URL}/Mouser-Linux.zip"
            }
          }
          EOF
          echo "==> Generated latest.json:"
          cat latest.json

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            # Release already exists — just upload the assets
            gh release upload "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --clobber \
              Mouser-Windows/Mouser-Windows.zip \
              Mouser-macOS/Mouser-macOS.zip \
              Mouser-macOS-intel/Mouser-macOS-intel.zip \
              Mouser-Linux/Mouser-Linux.zip \
              Mouser-Linux-deb/Mouser-Linux.deb \
              latest.json
          else
            gh release create "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --title "Mouser ${{ github.ref_name }}" \
              --generate-notes \
              Mouser-Windows/Mouser-Windows.zip \
              Mouser-macOS/Mouser-macOS.zip \
              Mouser-macOS-intel/Mouser-macOS-intel.zip \
              Mouser-Linux/Mouser-Linux.zip \
              Mouser-Linux-deb/Mouser-Linux.deb \
              latest.json
          fi
